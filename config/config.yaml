# ============================================================
# Predictive & Preference-Aware Compiler Optimization
# Global Configuration
# ============================================================

project:
  name: "Predictive-Preference-Aware-Compiler-Optimization"
  version: "1.0.0"
  author: "Satyam Singh Kumre"
  institution: "NIT Tiruchirappalli"

paths:
  data_dir: "data"
  raw_dir: "data/raw"
  features_dir: "data/features"
  labels_dir: "data/labels"
  processed_dir: "data/processed"
  results_dir: "results"
  figures_dir: "results/figures"
  tables_dir: "results/tables"
  logs_dir: "results/logs"
  models_dir: "results/models"

features:
  autophase_dim: 56
  cfg_features_dim: 10
  priority_vector_dim: 3
  total_feature_dim: 69  # 56 + 10 + 3

dataset:
  num_benchmarks: 30
  num_pass_sequences: 50
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42
  num_optimization_classes: 10

models:
  random_forest:
    n_estimators: 300
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: "sqrt"
    random_state: 42
    n_jobs: -1
    cv_folds: 5

  xgboost:
    n_estimators: 500
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    early_stopping_rounds: 30
    eval_metric: "mlogloss"

  dnn:
    hidden_layers: [256, 128, 64]
    dropout_rate: 0.3
    batch_norm: true
    learning_rate: 0.001
    batch_size: 32
    max_epochs: 200
    patience: 20
    weight_decay: 0.0001
    activation: "relu"
    optimizer: "adam"

  ensemble:
    method: "weighted_voting"
    weight_optimization: "validation_f1"

evaluation:
  metrics:
    - "execution_time_speedup"
    - "code_size_reduction"
    - "f1_score"
    - "compilation_overhead"
    - "adaptability_score"
  significance_level: 0.05
  num_bootstrap_samples: 1000

priority_presets:
  speed_first: [0.7, 0.2, 0.1]
  size_first: [0.2, 0.7, 0.1]
  balanced: [0.34, 0.33, 0.33]
  energy_efficient: [0.3, 0.3, 0.4]
  compile_fast: [0.1, 0.1, 0.8]

llvm_passes:
  # 50 common LLVM optimization passes
  available_passes:
    - "-mem2reg"
    - "-simplifycfg"
    - "-instcombine"
    - "-reassociate"
    - "-gvn"
    - "-licm"
    - "-loop-unroll"
    - "-loop-rotate"
    - "-loop-simplify"
    - "-indvars"
    - "-sccp"
    - "-dce"
    - "-adce"
    - "-deadargelim"
    - "-inline"
    - "-sroa"
    - "-early-cse"
    - "-jump-threading"
    - "-correlated-propagation"
    - "-tailcallelim"
    - "-loop-idiom"
    - "-loop-deletion"
    - "-loop-vectorize"
    - "-slp-vectorizer"
    - "-memcpyopt"
    - "-dse"
    - "-bdce"
    - "-constmerge"
    - "-globaldce"
    - "-globalopt"
    - "-ipsccp"
    - "-called-value-propagation"
    - "-float2int"
    - "-lower-constant-intrinsics"
    - "-loop-distribute"
    - "-loop-load-elim"
    - "-alignment-from-assumptions"
    - "-strip-dead-prototypes"
    - "-div-rem-pairs"
    - "-mergefunc"
